[www]
user = www-data
group = www-data

; Listen on a Unix socket instead of TCP so nginx can reach PHP-FPM reliably.
listen = /run/php-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Long DB restore (e.g. prepare_on_boot + psql) must not be cut off at 60s (avoids TCP_ABORT_ON_DATA to Postgres).
request_terminate_timeout = 3600s
php_admin_value[max_execution_time] = 3600
; Match nginx client_max_body_size (100M) — default PHP is often 2M and blocks video uploads.
php_admin_value[upload_max_filesize] = 100M
php_admin_value[post_max_size] = 110M
